# Guardian News Backend - Render Deployment

services:
  - type: web
    name: guardian-news-api
    env: python
    region: frankfurt  # EU region for GDPR compliance
    plan: free  # or starter, standard for production
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        sync: false  # Set manually in Render dashboard
      - key: DB_NAME
        value: guardian_news
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL
      - key: OPENAI_API_KEY
        sync: false  # Optional
      - key: DEBUG
        value: false
